name: CI
on:
  pull_request:
    branches: [main]
jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            make_args: ''
          - os: macos-latest
            make_args: '--arch x64'
          - os: windows-latest
            make_args: ''
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run rebuild
      - run: npm run make -- ${{ matrix.make_args }}
