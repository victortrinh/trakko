<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4a9af5"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Blue rounded square background -->
  <rect x="80" y="80" width="864" height="864" rx="190" fill="url(#bgGrad)"/>

  <!-- Subtle inner highlight -->
  <rect x="80" y="80" width="864" height="864" rx="190" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="3"/>

  <!-- 2x2 Grid of white rounded squares -->
  <g filter="url(#shadow)">
    <!-- Top-left -->
    <rect x="262" y="262" width="210" height="210" rx="40" fill="white" opacity="0.95"/>
    <!-- Top-right -->
    <rect x="552" y="262" width="210" height="210" rx="40" fill="white" opacity="0.7"/>
    <!-- Bottom-left -->
    <rect x="262" y="552" width="210" height="210" rx="40" fill="white" opacity="0.7"/>
    <!-- Bottom-right -->
    <rect x="552" y="552" width="210" height="210" rx="40" fill="white" opacity="0.5"/>
  </g>
</svg>
